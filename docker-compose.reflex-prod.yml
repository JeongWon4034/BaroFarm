# BaroFarm 분석 대시보드 단독 배포 (Reflex + MySQL)
# 도연이 barofarm과 합치기 전 단계 — Reflex만 독립 EC2에서 운영.
#
# 실행: EC2_PUBLIC_IP=<IP> MYSQL_ROOT_PASSWORD=<pw> docker compose -f docker-compose.reflex-prod.yml up -d --build
# 또는 .env.reflex 에 값 채운 뒤: docker compose -f docker-compose.reflex-prod.yml --env-file .env.reflex up -d --build

services:
  mysql:
    image: mysql:8.0
    container_name: baro-mysql-analytics
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?}"
      MYSQL_DATABASE: freshgrowth
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/seed_testdata.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backend/src/main/resources/seed_products_kamis.sql:/docker-entrypoint-initdb.d/03-products.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  reflex:
    build:
      context: ./analytics_reflex
      dockerfile: Dockerfile.prod
    container_name: baro-reflex
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 브라우저가 WebSocket으로 닿는 백엔드 주소 — EC2 퍼블릭 IP 필수
      REFLEX_API_URL: "http://${EC2_PUBLIC_IP:?}:8000"
      ANALYTICS_DB_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/freshgrowth?charset=utf8mb4"
    ports:
      - "3001:3001"   # Reflex 프론트엔드
      - "8000:8000"   # Reflex 백엔드 WebSocket
    restart: unless-stopped

volumes:
  mysql-data:
