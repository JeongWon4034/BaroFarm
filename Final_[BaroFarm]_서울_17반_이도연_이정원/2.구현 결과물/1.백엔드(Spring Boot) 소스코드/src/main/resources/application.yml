server:
  port: 8080

spring:
  config:
    # 실제 키는 gitignore된 application-local.yml(또는 환경변수)에서 주입 — 커밋 금지
    import: optional:file:application-local.yml
  servlet:
    multipart:
      max-file-size: 5MB      # 상품 이미지 업로드 1건 상한
      max-request-size: 6MB

# 상품 이미지 업로드 저장 위치. 도커에선 UPLOAD_DIR=/app/uploads(볼륨)로 주입해 영속화.
app:
  upload-dir: ${UPLOAD_DIR:uploads}
  datasource:
    url: jdbc:mysql://localhost:3306/freshgrowth?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.freshgrowth
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 생성형 AI (GMS — OpenAI 호환 프록시). 값은 application-local.yml / 환경변수에서 주입.
ai:
  base-url: ${AI_BASE_URL:}   # GMS 엔드포인트 (비밀 아님)
  api-key: ${AI_API_KEY:}     # GMS 키 (비밀! 커밋 금지)
  model: ${AI_MODEL:gpt-4o-mini}          # 설명·리포트 등 일반 작업(저비용)
  price-model: ${AI_PRICE_MODEL:gpt-4o}   # 추천가 단위 정규화 추론(정밀, mini로는 부족)

# KAMIS(농수산물유통정보) 시세 API (추천가 고도화). cert-key/cert-id는 application-local.yml에서 주입.
kamis:
  base-url: https://www.kamis.or.kr/service/price/xml.do
  cert-key: ${KAMIS_CERT_KEY:}   # KAMIS 인증키 (비밀!)
  cert-id: ${KAMIS_CERT_ID:}     # KAMIS 인증ID (비밀!)

# 네이버 쇼핑 검색 API (경쟁 소매가 비교 → 추천가 고도화). 상품명으로 검색해
# 컬리 등 여러 몰의 유사상품 최저가를 받아 원가(KAMIS) 대비 추천가를 산출한다.
# client-id/secret은 application-local.yml에서 주입(커밋 금지).
naver:
  shopping:
    base-url: https://openapi.naver.com/v1/search/shop.json
    client-id: ${NAVER_CLIENT_ID:}       # 네이버 개발자센터 Client ID (비밀!)
    client-secret: ${NAVER_CLIENT_SECRET:} # 네이버 개발자센터 Client Secret (비밀!)

# 식약처 조리식품 레시피 DB(COOKRCP01). 'sample'은 5건만, 전체는 foodsafetykorea.go.kr 무료키 발급.
recipe:
  base-url: ${RECIPE_BASE_URL:http://openapi.foodsafetykorea.go.kr/api}
  api-key: ${RECIPE_API_KEY:sample}

# JWT 인증. 운영에선 JWT_SECRET 환경변수로 override 권장.
jwt:
  secret: ${JWT_SECRET:freshgrowth-dev-secret-key-change-me-in-production-0123456789ab}
  expiry-ms: 86400000   # 24시간
