spring.application.name=freshgrowth-seoul-market-batch
spring.main.web-application-type=none

logging.level.root=INFO
logging.level.org.springframework.batch=INFO

spring.datasource.url=jdbc:mysql://localhost:3306/freshgrowth_batch?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=true
spring.batch.job.name=seoulMarketPriceJob

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

mybatis.mapper-locations=classpath:/mappers/*.xml
mybatis.type-aliases-package=com.freshgrowth.batch.dto
mybatis.configuration.map-underscore-to-camel-case=true

garak.api.url=http://www.garak.co.kr/homepage/publicdata/dataJsonOpen.do
garak.api.id=8455
garak.api.passwd=YOUR_GARAK_API_PASSWORD
garak.api.dataid=data52
garak.api.pagesize=10
garak.api.pageidx=1
garak.api.portal-templet=false
garak.api.p-ymd=20230822
garak.api.p-jymd=20230821
garak.api.d-cd=2
garak.api.p-jjymd=20220821
garak.api.p-pos-gubun=1
garak.api.pum-nm=

spring.ai.openai.api-key=YOUR_OPENAI_API_KEY
spring.ai.openai.chat.options.model=gpt-4o-mini
