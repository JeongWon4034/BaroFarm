server:
  port: 8080

spring:
  config:
    # мӢӨм ң нӮӨлҠ” gitignoreлҗң application-local.yml(лҳҗлҠ” нҷҳкІҪліҖмҲҳ)м—җм„ң мЈјмһ… вҖ” м»Өл°Ӣ кёҲм§Җ
    import: optional:file:application-local.yml
  datasource:
    url: jdbc:mysql://localhost:3306/freshgrowth?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.freshgrowth
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# мғқм„ұнҳ• AI (GMS вҖ” OpenAI нҳёнҷҳ н”„лЎқмӢң). к°’мқҖ application-local.yml / нҷҳкІҪліҖмҲҳм—җм„ң мЈјмһ….
ai:
  base-url: ${AI_BASE_URL:}   # GMS м—”л“ңнҸ¬мқёнҠё (л№„л°Җ м•„лӢҳ)
  api-key: ${AI_API_KEY:}     # GMS нӮӨ (л№„л°Җ! м»Өл°Ӣ кёҲм§Җ)
  model: ${AI_MODEL:gpt-4o-mini}
